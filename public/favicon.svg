<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Campfire Logs -->
  <path d="M25,80 L75,80 M20,85 L80,85" stroke="#4A3B32" stroke-width="8" stroke-linecap="round"/>
  <path d="M30,75 L70,85 M70,75 L30,85" stroke="#5C4033" stroke-width="7" stroke-linecap="round"/>

  <!-- Campfire Flame Layers -->
  <!-- Outer Dark Orange Flame -->
  <path d="M50,15 C65,35 75,55 70,72 C65,85 35,85 30,72 C25,55 35,35 50,15 Z" fill="#FF4500" opacity="0.9"/>
  <!-- Middle Bright Orange Flame -->
  <path d="M50,25 C60,40 68,57 65,72 C60,82 40,82 35,72 C32,57 40,40 50,25 Z" fill="#FF8C00"/>
  <!-- Inner Golden Yellow Flame -->
  <path d="M50,38 C56,50 62,62 60,72 C58,80 42,80 40,72 C38,62 44,50 50,38 Z" fill="#FFD700"/>

  <!-- Sparks -->
  <circle cx="50" cy="10" r="2.5" fill="#FFE4B5" opacity="0.8"/>
  <circle cx="68" cy="28" r="2" fill="#FFA500" opacity="0.7"/>
  <circle cx="32" cy="35" r="2.2" fill="#FF4500" opacity="0.6"/>
  <circle cx="58" cy="20" r="1.8" fill="#FFD700" opacity="0.9"/>
</svg>
